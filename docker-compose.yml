name: amplify

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    env_file: .env
    volumes:
      - ./data:/app/data
    networks: [amplify-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    env_file: .env
    volumes:
      - ./data:/app/data
    networks: [amplify-net]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on: [app, dashboard]
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/.htpasswd:/etc/nginx/.htpasswd:ro
    networks: [amplify-net]
    restart: unless-stopped

networks:
  amplify-net:
    driver: bridge
