<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AMPLIFY — Local SLM Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/glass.css') }}"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="backdrop"></div>
  <main class="glass">
    <header>
      <h1>⚡ AMPLIFY</h1>
      <div class="pill">backend: {{ backend }} · v{{ version }}</div>
    </header>
    <section id="log" class="log" aria-live="polite"></section>
    <form id="chat-form">
      <textarea id="prompt" placeholder="Ask anything…" rows="2" required></textarea>
      <button type="submit">Send</button>
    </form>
  </main>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
